      (function () {
        var params = new URLSearchParams(window.location.search);
        var p = params.get("p");
        if (!p) return;
        var q = decodeURIComponent(params.get("q") || "");
        var h = decodeURIComponent(params.get("h") || "");
        var base = "/";
        params.delete("p");
